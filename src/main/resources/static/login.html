<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <header class="topbar">
        <a href="/" class="brand">✦ The Vermillion Files</a>
        <a class="btn-link" href="/register.html">Create Account</a>
    </header>
    <p class="eyebrow">Return to the Investigation</p>
    <h2 class="candle-glow">Sign In</h2>
    <div class="card layout-stack">
        <p class="muted">The hall remembers your name. Sign in and relight the case.</p>
        <div class="amber-divider"></div>
        <label for="username">Username</label>
        <input id="username" placeholder="Username">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn">Enter the Hall</button>
        <p id="msg" class="muted"></p>
    </div>
</div>
<script src="/app.js"></script>
<script>
document.getElementById("loginBtn").onclick = async () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    try {
        const data = await api("/api/auth/login", { method: "POST", body: JSON.stringify({ username, password }) });
        localStorage.setItem("userId", data.id);
        localStorage.setItem("username", data.username);
        window.location.href = "/hall.html";
    } catch (e) {
        document.getElementById("msg").textContent = e.message;
    }
};
</script>
</body>
</html>
