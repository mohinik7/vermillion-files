<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="container">
    <header class="topbar">
        <a href="/" class="brand">✦ The Vermillion Files</a>
    </header>
    <p class="eyebrow">Open a New Case File</p>
    <h2 class="candle-glow">Register</h2>
    <div class="card layout-stack">
        <p class="muted">Create your detective file to record solved nights, rankings, and reviews.</p>
        <div class="amber-divider"></div>
        <label for="username">Username</label>
        <input id="username" placeholder="Username">
        <label for="email">Email</label>
        <input id="email" placeholder="Email">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Password">
        <button id="registerBtn">Open Case File</button>
        <p id="msg" class="muted"></p>
    </div>
</div>
<script src="/app.js"></script>
<script>
const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;

function isValidEmail(email) {
    if (!emailRegex.test(email) || email.length > 254 || email.includes(" ")) return false;
    const [local, domain] = email.split("@");
    if (!local || !domain) return false;
    if (local.startsWith(".") || local.endsWith(".") || domain.startsWith(".") || domain.endsWith(".")) return false;
    if (local.includes("..") || domain.includes("..")) return false;
    return true;
}

document.getElementById("registerBtn").onclick = async () => {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();
    if (!username || !email || password.length < 6) {
        document.getElementById("msg").textContent = "Fill all fields (password >= 6 chars).";
        return;
    }
    if (!isValidEmail(email)) {
        document.getElementById("msg").textContent = "Please enter a valid email address.";
        return;
    }
    try {
        await api("/api/auth/register", { method: "POST", body: JSON.stringify({ username, email, password }) });
        window.location.href = "/login.html";
    } catch (e) {
        document.getElementById("msg").textContent = e.message;
    }
};
</script>
</body>
</html>
